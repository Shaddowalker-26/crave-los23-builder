name: LOS23 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Crave
        run: |
          mkdir -p ${HOME}/bin
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv crave ${HOME}/bin/
          sudo ln -sf /home/${USER}/bin/crave /usr/bin/crave

      - name: Setup Crave Config
        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}
        run: |
          cat > ${HOME}/crave.conf <<EOF
          {
            "username": "${CRAVE_USERNAME}",
            "headers": {
              "Content-Type": "application/json",
              "Authorization": "${CRAVE_TOKEN}",
              "User-Agent": "Crave"
            },
            "projects": [],
            "server": "https://foss.crave.io/api"
          }
          EOF

          echo "Testing Crave connection..."
          crave -c ${HOME}/crave.conf quota

      - name: Start Build
        env:
          KEYS_PAT: ${{ secrets.KEYS_PAT }}
        run: |
          crave -c ${HOME}/crave.conf run --no-patch --project-id 93 -- "
            set -e

            export KEYS_PAT=${KEYS_PAT}

            echo '--- Initializing repo ---'
            repo init -u https://github.com/LineageOS/android.git \
              -b lineage-23.2 \
              --git-lfs

            echo '--- Setting up local manifests ---'
            rm -rf .repo/local_manifests
            git clone https://github.com/Shaddowalker-26/android_local_manifests.git \
              -b main .repo/local_manifests

            echo '--- Syncing sources ---'
            repo sync -c --no-tags --no-clone-bundle -j\$(nproc --all)

            echo '--- Setting up signing keys ---'
            if [ -d vendor/lineage-priv/keys ]; then
              git -C vendor/lineage-priv/keys pull
            else
              git clone https://\${KEYS_PAT}@github.com/Shaddowalker-26/android_vendor_keys.git \
                vendor/lineage-priv/keys
            fi

            echo '--- Starting build ---'
            export BUILD_USERNAME=Shaddowalker-26
            export BUILD_HOSTNAME=crave

            source build/envsetup.sh
            lunch lineage_spes-trunk_staging-userdebug
            mka bacon
          "

      - name: Upload Error Log
        if: failure()
        run: |
          crave -c ${HOME}/crave.conf pull out/error.log || true
          if [ -f out/error.log ]; then
            cat out/error.log
          fi
